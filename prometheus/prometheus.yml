global:
  scrape_interval: 15s
  evaluation_interval: 15s

  external_labels:
    monitor: "codelab-monitor"

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: cadvisor
    static_configs:
      - targets: ['cadvisor:8080']

  - job_name: stub-service
    metrics_path: /actuator/metrics/prometheus
    static_configs:
      - targets: ["localhost:8080"]
  - job_name: 'aggregator'
    metrics_path: /metrics
    static_configs:
      - targets: ['localhost:8085']
  - job_name: 'bash_host'
    honor_labels: true
    static_configs:
      - targets: ['localhost:9091']
  - job_name: 'mock_payment'
    static_configs:
      - targets: ['mock-payment:1337']
